version: '3.8'

services:
  autoclaw-proxy:
    build: .
    container_name: autoclaw-proxy
    ports:
      - "8070:8070"
    volumes:
      - ./autoclaw_accounts.json:/app/autoclaw_accounts.json
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8070/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
